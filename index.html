<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <title>LinkedIn-Texthelfer</title>
    <style>
      :root {
        --bg: #faf7f0;
        --paper: #fffdf8;
        --ink: #211c17;
        --muted: #686057;
        --line: #c7332b;
        --line-soft: #f3d3cd;
        --green: #0f7a5f;
        --green-soft: #d7eee6;
        --border: rgba(33, 28, 23, 0.14);
        --shadow: 0 18px 50px rgba(56, 42, 24, 0.11);
        --shadow-soft: 0 14px 36px rgba(56, 42, 24, 0.09);
        --serif: Georgia, "Times New Roman", serif;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.45;
        color: var(--ink);
        background: var(--bg);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        padding: 1.25rem;
        background:
          radial-gradient(circle at 10% 0%, rgba(199, 51, 43, 0.08), transparent 32rem),
          linear-gradient(180deg, #fbf4e9 0%, var(--bg) 42%, #f6efe4 100%);
        color: var(--ink);
      }
      main {
        max-width: 1020px;
        margin: 0 auto;
        display: grid;
        gap: 1rem;
      }
      .card {
        background: color-mix(in srgb, var(--paper) 92%, white);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1rem;
        box-shadow: var(--shadow-soft);
      }
      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.45rem;
        font-family: var(--serif);
        font-weight: 400;
        letter-spacing: -0.02em;
      }
      h2 {
        margin: 0 0 0.6rem;
        font-family: var(--serif);
        font-weight: 400;
        letter-spacing: -0.02em;
      }
      .muted {
        color: var(--muted);
        margin: 0;
      }
      textarea {
        width: 100%;
        min-height: 220px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.75rem;
        font: inherit;
        line-height: 1.4;
        background: #fff;
        color: var(--ink);
      }
      textarea:focus {
        outline: 2px solid color-mix(in srgb, var(--line) 30%, transparent);
        outline-offset: 1px;
      }
      .toolbar {
        margin-top: 0.6rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
      }
      .section-head h2 {
        margin: 0;
      }
      .icon-btn {
        width: 2rem;
        height: 2rem;
        padding: 0;
        border-radius: 999px;
        display: inline-grid;
        place-items: center;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1;
      }
      .icon-btn:hover {
        color: var(--ink);
      }
      button {
        border: 1px solid var(--border);
        background: color-mix(in srgb, var(--paper) 92%, white);
        border-radius: 999px;
        padding: 0.45rem 0.7rem;
        font: inherit;
        cursor: pointer;
        color: var(--ink);
      }
      button:hover {
        background: var(--line-soft);
        border-color: color-mix(in srgb, var(--line) 30%, var(--border));
      }
      .top3 {
        display: grid;
        gap: 0.8rem;
      }
      .item {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.7rem;
        background: rgba(255, 253, 248, 0.75);
      }
      .item h3 {
        margin: 0 0 0.25rem;
        font-size: 1rem;
      }
      .pill {
        display: inline-block;
        border-radius: 999px;
        padding: 0.1rem 0.5rem;
        font-size: 0.78rem;
        border: 1px solid var(--border);
        color: var(--muted);
        background: #fff;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font-size: 0.82rem;
        color: #40372f;
      }
      .preview {
        border-left: 3px solid var(--line);
        padding-left: 0.75rem;
      }
      .preview-head {
        font-family: var(--serif);
        font-size: 1.1rem;
        letter-spacing: -0.01em;
        margin-bottom: 0.45rem;
      }
      .preview-intro {
        margin: 0;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>LinkedIn-Texthelfer</h1>
        <p class="muted">
          Lokale Analyse ohne Server. Fokus: bessere Texte, kein Verschlimmbessern.
        </p>
      </section>

      <section class="card">
        <label for="inputText"><strong>Text</strong></label>
        <textarea id="inputText" placeholder="Füge hier deinen LinkedIn-Entwurf ein ..."></textarea>
        <div class="toolbar">
          <button id="copyInputBtn" type="button">Input kopieren</button>
          <button id="clearBtn" type="button">Leeren</button>
          <span id="status" class="muted"></span>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Die 3 größten Hebel</h2>
          <button id="copyTop3Btn" type="button">Top-3 kopieren</button>
        </div>
        <div id="top3" class="top3"></div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Feed-Vorschau</h2>
          <button
            id="copyPreviewBtn"
            class="icon-btn"
            type="button"
            title="Vorschau kopieren"
            aria-label="Feed-Vorschau kopieren"
          >⧉</button>
        </div>
        <div id="preview" class="preview muted">Noch keine Vorschau.</div>
      </section>

      <section class="card">
        <details>
          <summary><strong>Checkliste / Details</strong></summary>
          <div id="detailsList" class="top3" style="margin-top:0.7rem;"></div>
        </details>
      </section>

      <section class="card">
        <details>
          <summary><strong>Debug-Modell</strong></summary>
          <pre id="debugOut" style="margin-top:0.7rem;"></pre>
        </details>
      </section>
    </main>
    <script type="module" src="./app.js?v=20260505-1"></script>
  </body>
</html>
